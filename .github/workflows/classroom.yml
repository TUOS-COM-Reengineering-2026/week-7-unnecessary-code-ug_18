name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: T1.1 Jaccard Similarity
      id: t1-1-jaccard-similarity
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: T1.1 Jaccard Similarity
        setup-command: pip install -r requirements.txt
        command: pytest tests/test_jaccard.py -v
        timeout: 1
        max-score: 5
    - name: T1.2 Dot Plots
      id: t1-2-dot-plots
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: T1.2 Dot Plots
        setup-command: pip install -r requirements.txt
        command: pytest tests/test_dot_plots.py -v
        timeout: 1
        max-score: 10
    - name: T2.1 Dead Code
      id: t2-1-dead-code
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: T2.1 Dead Code
        setup-command: pip install -r requirements.txt
        command: pytest tests/test_dead_code.py -v
        timeout: 1
        max-score: 5
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        T1-1-JACCARD-SIMILARITY_RESULTS: "${{steps.t1-1-jaccard-similarity.outputs.result}}"
        T1-2-DOT-PLOTS_RESULTS: "${{steps.t1-2-dot-plots.outputs.result}}"
        T2-1-DEAD-CODE_RESULTS: "${{steps.t2-1-dead-code.outputs.result}}"
      with:
        runners: t1-1-jaccard-similarity,t1-2-dot-plots,t2-1-dead-code
